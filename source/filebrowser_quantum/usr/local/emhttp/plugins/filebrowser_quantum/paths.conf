# --- 插件基础元数据 ---
GITHUB_REPO="gtsteffaniak/filebrowser"
BINARY="/usr/sbin/filebrowser_quantumorig"
ARCH_TYPE="linux-amd64-filebrowser"
TAG="FileBrowser-Plugin"
PLUGIN_NAME="filebrowser_quantum"
PLG_PATH="/boot/config/plugins/filebrowser_quantum"
CONFIG_YAML="/boot/config/plugins/filebrowser_quantum/config.yaml"
SETTINGS_FILE="/boot/config/plugins/filebrowser_quantum/settings.cfg"
INSTALL_PATH="/boot/config/plugins/filebrowser_quantum/install"
BETA_MARKER="/boot/config/plugins/filebrowser_quantum/install/beta"
LATEST_MARKER="/boot/config/plugins/filebrowser_quantum/install/latest"

DAEMON_SCRIPT="/usr/local/emhttp/plugins/filebrowser_quantum/Daemon.sh"

# --- 可配置常量（避免魔法数字） ---
DEFAULT_PORT=8081                      # 默认服务端口
MIN_BINARY_SIZE=$((15 * 1024 * 1024))  # 二进制文件最小体积 (15MB)
MAX_SHUTDOWN_WAIT=10                   # 服务停止最大等待秒数
STARTUP_CHECK_INTERVAL=1               # 启动检测间隔秒数
STARTUP_CHECK_RETRIES=5                # 启动检测最大重试次数
